<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Goat Runner - Play</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Background -->
    <div id="background"></div>

    <!-- Game Container -->
    <div id="game">

        <!-- Score -->
        <div id="scorePanel">
            <span>Score: <span id="score">0</span></span>
            <span>High Score: <span id="highScore">0</span></span>
        </div>

        <!-- Power-ups -->
        <div id="powerPanel">
            <span id="speedBoost">⚡ Speed Boost</span>
            <span id="slowMotion">⏳ Slow Motion</span>
        </div>

        <!-- Goat -->
        <img
            src="images/goat/goat-run.png"
            id="goat"
            alt="Goat"
        >

        <!-- Ground -->
        <div id="ground"></div>

    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="overlay">

        <h1>🐐 Goat Runner</h1>

        <button id="startBtn">
            ▶ Start Game
        </button>

    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">

        <h1>Game Over</h1>

        <h2>Your Score</h2>

        <h3 id="finalScore">0</h3>

        <button id="restartBtn">
            🔄 Restart
        </button>

        <a href="index.html" class="menuButton">
            🏠 Main Menu
        </a>

    </div>

    <!-- Audio -->
    <audio id="jumpSound" src="audio/jump.mp3"></audio>

    <audio id="coinSound" src="audio/coin.mp3"></audio>

    <audio id="hitSound" src="audio/hit.mp3"></audio>

    <audio id="bgMusic" src="audio/background.mp3" loop></audio>

    <!-- JavaScript -->
    <script src="js/player.js"></script>
    <script src="js/obstacles.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
